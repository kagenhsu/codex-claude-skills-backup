<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">安裝流程示意圖</title>
  <desc id="desc">展示從 GitHub 下載安裝包，安裝到 Codex skills 與 Claude Code skills，最後打開本機控制台。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8ff"/>
      <stop offset="100%" stop-color="#eef3fb"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#23436f" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="980" height="420" rx="28" fill="url(#bg)"/>
  <text x="44" y="58" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" font-weight="800" fill="#172033">安裝流程很單純：下載、放好、打開</text>
  <text x="44" y="94" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" fill="#52637d">腳本只是幫你把整理好的 skills 放到固定資料夾，並建立一個方便打開的控制台入口。</text>
  <g filter="url(#shadow)">
    <rect x="54" y="140" width="190" height="150" rx="22" fill="url(#panel)" stroke="#d8e4f5"/>
    <text x="149" y="184" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="800" fill="#172033">GitHub</text>
    <text x="149" y="218" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#52637d">下載 skills 備份包</text>
    <text x="149" y="246" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#52637d">和控制台檔案</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="298" y="140" width="190" height="150" rx="22" fill="url(#panel)" stroke="#d8e4f5"/>
    <text x="393" y="184" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="800" fill="#172033">Codex</text>
    <text x="393" y="222" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#52637d">安裝到</text>
    <text x="393" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#1f4fbf">~/.codex/skills</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="542" y="140" width="190" height="150" rx="22" fill="url(#panel)" stroke="#d8e4f5"/>
    <text x="637" y="184" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="800" fill="#172033">Claude Code</text>
    <text x="637" y="222" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#52637d">安裝到</text>
    <text x="637" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#1f4fbf">~/.claude/skills</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="786" y="140" width="140" height="150" rx="22" fill="#fff8ed" stroke="#f0d7a5"/>
    <text x="856" y="184" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="800" fill="#172033">控制台</text>
    <text x="856" y="222" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#6b5a38">桌面捷徑</text>
    <text x="856" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#6b5a38">雙擊打開</text>
  </g>
  <path d="M252 215 H288" stroke="#3b6fe0" stroke-width="4" stroke-linecap="round"/>
  <path d="M496 215 H532" stroke="#3b6fe0" stroke-width="4" stroke-linecap="round"/>
  <path d="M740 215 H776" stroke="#3b6fe0" stroke-width="4" stroke-linecap="round"/>
  <rect x="72" y="328" width="836" height="48" rx="16" fill="#dbeafe" stroke="#bfdbfe"/>
  <text x="490" y="358" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" font-weight="700" fill="#1f3763">安裝完成後，重新啟動 Codex 和 Claude Code，讓它們讀到新的 skills。</text>
</svg>
