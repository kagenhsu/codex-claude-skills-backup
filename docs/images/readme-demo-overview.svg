<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">二刀流控制台用途示意圖</title>
  <desc id="desc">展示新手從線上 demo 複製提示詞，交給 Codex 和 Claude Code 協作。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef6ff"/>
      <stop offset="62%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#fff7e6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f4fbf"/>
      <stop offset="100%" stop-color="#3b6fe0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#23436f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="980" height="360" rx="28" fill="url(#bg)"/>
  <text x="44" y="58" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" font-weight="800" fill="#172033">新手先看 demo，再複製提示詞</text>
  <text x="44" y="94" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17" fill="#52637d">不用先懂一堆術語，照著按、貼給 AI，就能開始跑二刀流流程。</text>
  <g filter="url(#shadow)">
    <rect x="44" y="130" width="270" height="160" rx="22" fill="#ffffff" stroke="#d8e4f5"/>
    <circle cx="76" cy="166" r="18" fill="#dbeafe"/>
    <text x="76" y="172" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="800" fill="#1f4fbf">1</text>
    <text x="104" y="171" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="800" fill="#172033">打開線上 demo</text>
    <text x="68" y="216" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#52637d">先看介面、找提示詞、</text>
    <text x="68" y="244" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#52637d">確認自己需要什麼功能。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="356" y="130" width="270" height="160" rx="22" fill="#ffffff" stroke="#d8e4f5"/>
    <circle cx="388" cy="166" r="18" fill="#dbeafe"/>
    <text x="388" y="172" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="800" fill="#1f4fbf">2</text>
    <text x="416" y="171" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="800" fill="#172033">按下複製按鈕</text>
    <rect x="386" y="205" width="210" height="48" rx="14" fill="url(#blue)"/>
    <text x="491" y="235" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="800" fill="#ffffff">複製新手提示詞</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="668" y="130" width="270" height="160" rx="22" fill="#ffffff" stroke="#d8e4f5"/>
    <circle cx="700" cy="166" r="18" fill="#dbeafe"/>
    <text x="700" y="172" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="800" fill="#1f4fbf">3</text>
    <text x="728" y="171" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="800" fill="#172033">貼給 AI 使用</text>
    <text x="692" y="216" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#52637d">Codex 負責規劃實作，</text>
    <text x="692" y="244" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#52637d">Claude Code 幫忙審查。</text>
  </g>
  <path d="M320 210 C335 210 340 210 350 210" stroke="#3b6fe0" stroke-width="4" stroke-linecap="round"/>
  <path d="M632 210 C647 210 652 210 662 210" stroke="#3b6fe0" stroke-width="4" stroke-linecap="round"/>
</svg>
