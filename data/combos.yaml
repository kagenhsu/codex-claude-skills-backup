- title: 開新專案起手包
  usage: 開始一個新專案時，快速建立規則、PRD 與繁中 GitHub 說明。
  category: 專案啟動
  steps:
    - prompt_title: 從討論結果產出 AGENTS.md（設計方向確認後用）
      custom_intro: 第一步，先把討論過的設計方向整理成專案規則文件。
    - prompt_title: 梳理需求並產出 PRD
      custom_intro: 第二步，把需求整理成可開發、可驗收的 PRD。
    - prompt_title: 建立 .gitignore + 種子 DUAL-AI-STATE
      custom_intro: 第三步，先補版控忽略規則與初始進度檔，讓後面接手不會亂掉。
    - prompt_title: 首次上傳 GitHub：繁體中文專案敘述
      custom_intro: 第四步，整理繁體中文 repo 說明、版本摘要與 push 前檢查。
- title: 二刀流審查修正包
  usage: Codex 做完實作後，交給 Claude Code 審查，再回到 Codex 修正與收尾。
  category: 二刀流協作
  steps:
    - prompt_title: 深度同行評審：5 子代理 Code Review
      custom_intro: 【進階】需填入完整專案背景時使用，適合 release 或複雜改動前的深度審查。
    - prompt_title: ③ 第三階段：Codex 審查＋修改
      custom_intro: 【標準】直接貼入 Claude Code 的交接摘要使用，已內建 5 子代理，適合日常審查。
    - prompt_title: 給 Codex 的逐條修正轉交提示詞（模板）
      custom_intro: 審查完後，把問題逐條搬回 Codex 修正。
    - prompt_title: 給 Codex 的存檔收尾提示詞（模板）
      custom_intro: 複審通過後，請 Codex 做最後驗證、狀態檔與本地 commit。
- title: 跨地點接續包
  usage: 公司、家裡、Mac mini、Windows 電腦之間接續同一個專案。
  category: 二刀流協作
  steps:
    - prompt_title: 跨地點 / 跨系統接續
      custom_intro: 下班、換電腦或不同系統接手前，先完成安全存檔與交接。
    - prompt_title: 查目前進度（讀 DUAL-AI-STATE.md）
      custom_intro: 另一台電腦接手後，先讀狀態檔確認目前到哪。
    - prompt_title: 額度快滿自動存檔＋換手
      custom_intro: 如果 AI 額度快滿，先保進度再換手，避免工作斷掉。
- title: 角色互換包（Claude 主刀 → Codex 收尾）
  usage: 設計／品味活由 Claude Code 主刀，實作／指令由 Codex 主刀；換手前一定先換狀態（寫 DUAL-AI-STATE.md ＋ git commit），最終上架與備份永遠回到 Codex（只有 Codex 能在預覽器內逐條改註記）。
  category: 二刀流協作
  steps:
    - prompt_title: 二刀流分工細節說明
      custom_intro: 第零步，先把兩邊分工原則對齊，特別釐清「為什麼最後收尾一定回 Codex」。
    - prompt_title: ① 第一階段：Claude Code 規劃
      custom_intro: 第一步，由 Claude Code 主刀規劃與設計（長討論、權衡、品味活）。
    - prompt_title: ② 第二階段：Claude Code 分段實作
      custom_intro: 第二步，Claude Code 把規劃落成初版實作；換手前先寫 DUAL-AI-STATE.md ＋ git commit「handoff to codex」。
    - prompt_title: ③ 第三階段：Codex 審查＋修改
      custom_intro: 第三步，換手到 Codex：先讀狀態檔，再做審查＋跑 build／test／修錯。
    - prompt_title: ④ 第四階段：Claude Code 修正＋開發
      custom_intro: 第四步，若還有設計／品味問題，換回 Claude Code 修；同樣先存狀態＋commit「handoff to claude」。
    - prompt_title: ⑤ 第五階段：Codex 複審＋修改
      custom_intro: 第五步，回到 Codex 做複審與最後修改，確認可以收。
    - prompt_title: 給 Codex 的存檔收尾提示詞（模板）
      custom_intro: 最後一步，永遠由 Codex 收尾：在預覽器內逐條改註記、最終 commit／push／tag、更新 DUAL-AI-STATE.md 為「已交付」。
