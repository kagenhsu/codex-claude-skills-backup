<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二刀流開發助手控制台｜Codex × Claude Code 開發系統</title>
<style>
  :root{--bg:#f4f6fb; --panel:#eef1f8; --card:#ffffff; --border:#d9e0ef; --text:#1f2937; --muted:#657085; --accent:#3b6fe0; --accent-soft:#e8eefc; --green:#168a55; --amber:#a66a00; --red:#c23b3b; --shadow:0 1px 3px rgba(30,40,80,.07);}
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif; line-height:1.55;}
  header{position:sticky; top:0; z-index:50; background:rgba(244,246,251,.92); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); padding:12px 24px 0; border-bottom:1px solid var(--border); box-shadow:0 4px 16px rgba(30,40,80,.05);}
  .head-inner{max-width:1120px; margin:0 auto;}
  h1{font-size:1.05rem; display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  h1 .sub{font-size:.78rem; color:var(--muted); font-weight:normal;}
  .tabs{display:flex; gap:8px; flex-wrap:wrap;}
  .tab{padding:8px 14px; border-radius:10px 10px 0 0; background:transparent; border:none; color:var(--muted); font-size:.92rem; cursor:pointer; border-bottom:2px solid transparent;}
  .tab.active{color:var(--text); border-bottom-color:var(--accent); background:var(--panel);}
  main{max-width:1120px; margin:0 auto; padding:14px 24px 60px;}
  .search{margin:0 0 12px; position:relative;}
  .search input{width:100%; padding:11px 16px 11px 40px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:.96rem; outline:none;}
  .search input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,111,224,.12);}
  .search .icon{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted);}
  .page-intro{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:14px; box-shadow:var(--shadow);}
  .page-intro h2{font-size:1.12rem; margin-bottom:6px;}
  .lead{font-size:.92rem; color:var(--text); margin-bottom:10px;}
  .intro-grid,.workflow-guide{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px;}
  .intro-item,.guide-item{background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px 12px;}
  .intro-label,.guide-label{font-size:.74rem; color:var(--muted); margin-bottom:3px;}
  .intro-text,.guide-text{font-size:.84rem; color:var(--text);}
  .chips,.flow-switch{display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 14px;}
  .chip,.flow-btn{padding:6px 13px; border-radius:999px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-size:.84rem; cursor:pointer;}
  .chip.active,.flow-btn.active{background:var(--accent); border-color:var(--accent); color:#fff;}
  .count{color:var(--muted); font-size:.83rem; margin-bottom:10px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; display:flex; flex-direction:column; gap:8px; box-shadow:var(--shadow);}
  .card h3{font-size:.98rem; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .badge,.cat-tag,.stage-tag{font-size:.7rem; padding:2px 8px; border-radius:999px; font-weight:600;}
  .badge.low{background:rgba(31,157,99,.12); color:var(--green);}
  .badge.mid{background:rgba(185,127,16,.12); color:var(--amber);}
  .badge.high{background:rgba(208,69,69,.12); color:var(--red);}
  .cat-tag{color:var(--muted); border:1px solid var(--border); font-weight:500;}
  .stage-tag{background:var(--accent-soft); color:#244fae;}
  .summary{font-size:.87rem; color:var(--text);}
  .notes{font-size:.8rem; color:var(--amber);}
  .usage{font-size:.8rem; color:var(--muted);}
  .trigger{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:8px 10px;}
  .trigger code{flex:1; font-size:.8rem; color:#2c4a9e; font-family:inherit; word-break:break-all;}
  .copy-btn{width:100%; border:none; border-radius:8px; background:var(--accent); color:#fff; padding:7px 12px; font-size:.82rem; cursor:pointer; transition:background .15s; text-decoration:none; text-align:center;}
  .trigger .copy-btn{width:auto; flex-shrink:0;}
  .copy-btn:hover{background:#2f5cc4;}
  .copy-btn.done{background:var(--green);}
  pre.prompt-body{background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:.8rem; color:#33405e; white-space:pre-wrap; font-family:inherit; max-height:170px; overflow:auto;}
  .flow-section{margin-top:18px;}
  .section-head{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin:0 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border);}
  .section-head h2{font-size:1rem;}
  .section-head .hint{font-size:.8rem; color:var(--muted);}
  .sop{max-width:780px; display:flex; flex-direction:column; gap:16px;}
  .progress-sop,.wide-sop{max-width:none; width:100%;}
  .wide-sop>.card{width:100%; box-sizing:border-box;}
  .sop .card{gap:10px;}
  .sop h2{font-size:1.06rem;}
  .sop h3{font-size:.94rem; margin-top:6px;}
  .sop ol,.sop ul{padding-left:1.4em; font-size:.9rem;}
  .sop li{margin:4px 0;}
  .sop table{width:100%; border-collapse:collapse; font-size:.88rem; border:1px solid var(--border); border-radius:8px; overflow:hidden;}
  .sop th,.sop td{border:1px solid var(--border); padding:8px 10px; vertical-align:top; text-align:left;}
  .sop th{background:var(--panel); font-weight:700;}
  .sop code{background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:1px 5px;}
  .form-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:.78rem; color:var(--muted);}
  .field .help{font-size:.74rem; color:var(--muted);}
  .field input,.field select,.field textarea{width:100%; border:1px solid var(--border); border-radius:8px; background:#fff; color:var(--text); padding:9px 10px; font:inherit; font-size:.88rem;}
  .field textarea{min-height:120px; resize:vertical;}
  .capture-switch{display:flex; gap:8px; flex-wrap:wrap;}
  .capture-btn{padding:7px 13px; border-radius:999px; border:1px solid var(--border); background:var(--card); color:var(--muted); cursor:pointer;}
  .capture-btn.active{background:var(--accent); border-color:var(--accent); color:#fff;}
  .checkline{display:flex; align-items:flex-start; gap:8px; font-size:.85rem; color:var(--text);}
  .checkline input{margin-top:3px;}
  .warning{font-size:.8rem; color:var(--amber); background:rgba(185,127,16,.09); border:1px solid rgba(185,127,16,.2); border-radius:8px; padding:8px 10px;}
  .copy-btn:disabled{background:#aab4c8; cursor:not-allowed;}
  .state-board{margin-bottom:16px;}
  .state-board textarea{width:100%; min-height:130px; border:1px solid var(--border); border-radius:8px; padding:10px 12px; font:inherit; font-size:.86rem; resize:vertical;}
  .state-summary{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-top:10px;}
  .state-item{background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px;}
  .state-item.full{grid-column:1/-1;}
  .state-label{font-size:.74rem; color:var(--muted); margin-bottom:3px;}
  .state-value{font-size:.85rem; white-space:pre-wrap;}
  .state-stage-active{outline:2px solid var(--accent); background:var(--accent-soft);}
  .combo-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; margin-bottom:16px;}
  .combo-card{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:8px; box-shadow:var(--shadow);}
  .combo-steps{font-size:.78rem; color:var(--muted); padding-left:1.2em;}
  .empty{color:var(--muted); text-align:center; padding:36px 0;}
  footer{text-align:center; color:var(--muted); font-size:.75rem; padding:20px;}
  @media (max-width:760px){main,header{padding-left:14px; padding-right:14px;} .grid,.intro-grid,.workflow-guide,.state-summary{grid-template-columns:1fr;} .section-head{display:block;} }
</style>
</head>
<body>
<header><div class="head-inner"><h1>二刀流開發助手控制台 <span class="sub">Codex × Claude Code 開發系統</span></h1><div class="tabs"><button class="tab active" data-tab="guide">AI 角色導覽</button><button class="tab" data-tab="progress">開發進度</button><button class="tab" data-tab="workflow">三方 AI 工作流</button><button class="tab" data-tab="control">三方中控</button><button class="tab" data-tab="prompts">提示詞庫</button><button class="tab" data-tab="skills">Skills</button><button class="tab" data-tab="capture">收錄新內容</button><button class="tab" data-tab="sop">安檢 SOP</button><button class="tab" data-tab="backup">換電腦／同步</button></div></div></header>
<main><div class="search"><span class="icon">搜</span><input id="searchBox" type="text" placeholder="搜尋 skill、提示詞、觸發句、角色、分工、導覽，例如：git、翻譯、審查、三方 AI"></div><div id="pageIntro" class="page-intro"></div><div id="chips" class="chips"></div><div id="countLine" class="count"></div><div id="content"></div></main>
<footer>資料來源：data/skills.yaml + data/prompts.yaml + data/combos.yaml；修改後執行 python3 scripts/build.py 重建</footer>

 "risk": "低", "summary": "對話開始時建立「先找有沒有合適 skill 再回答」的工作習慣", "triggers": ["（自動觸發）每次對話開始時 AI 會自行套用"]}, {"name": "dual-ai-workflow", "category": "規劃與協作", "risk": "低", "summary": "自製 skill：三方 AI 工作流（Codex＝主力工程師，負責規劃、分段實作、測試與修正；Claude Code（VS Code）＝審查員，負責架構審查、風險檢查與複審；Claude Desktop＝顧問／文字助理，使用提示詞版不安裝第三方 skills），並用 DUAL-AI-STATE.md 記錄進度", "triggers": ["使用 dual-ai-workflow 開始三方 AI 工作流（舊稱雙AI），任務是：【任務描述】", "使用 dual-ai-workflow 開始三方 AI 工作流，任務是：【任務描述】", "這是另一個 AI 的輸出，依 dual-ai-workflow 接續下一階段"], "notes": "本專案自製；Codex 與 Claude Code 需同步到 ~/.codex/skills、~/.claude/skills 或各環境實際 skill 路徑；Claude Desktop 不安裝第三方 skills，請用提示詞庫手動套用"}], "prompts": [{"title": "開發協作規範（AGENTS.md 範本）", "category": "專案啟動", "usage": "開新專案時，先讓 AI 遵守這套規矩", "prompt": "以下是本專案的開發協作規範，請全程遵守：\n1. 每個任務先看規劃文件再執行\n2. 一個對話只做一個明確任務\n3. 不要刪除文件，除非我明確要求\n4. 需求不清楚時，先提出關鍵問題，不要直接猜著做\n5. 任務有風險時，先明說風險，再執行\n6. 修改完成後，總結：改了哪些內容、如何檢查、下一步建議\n7. 每次回答用小白能聽懂的話解釋\n8. 遇到技術專有名詞時，用一句簡單的話解釋它的意思和邏輯\n", "flow": "common", "stage": ""}, {"title": "建立 AGENTS.md 頂層規則文件", "category": "專案啟動", "usage": "開新專案的第一步", "prompt": "請在專案根目錄只建立一個頂層規則文件 AGENTS.md，把我們的協作規範寫進去。\n之後每次回答都要用我聽得懂的話解釋，不要亂刪文件。\n專案名稱：【】\n專案簡介：【】\n", "flow": "common", "stage": ""}, {"title": "梳理需求並產出 PRD", "category": "專案啟動", "usage": "想法還很模糊時，先討論再寫文件", "prompt": "先和我討論、梳理需求，確認後再建立 PRD.md 檔案，至少包含：\n## 1. 專案背景\n## 2. 專案目標\n## 3. 專案痛點\n## 4. 功能清單\n## 5. 不做的事\n我們先討論，先不要寫程式。\n", "flow": "common", "stage": ""}, {"title": "依 PRD 設計與開發", "category": "開發過程", "usage": "PRD 確認後，正式開工", "prompt": "閱讀本專案的 PRD.md 需求文檔，依文件幫我設計系統並寫程式。\n開始前先列出你的實作計畫給我確認，確認後再動手。\n", "flow": "common", "stage": ""}, {"title": "功能建構（調用模型／套件／skill）", "category": "開發過程", "usage": "要 AI 用特定工具完成特定功能時", "prompt": "請調用【模型/套件/skill 名稱】，為這個專案【生成/優化】【目標功能】，\n基於【現有檔案或需求說明】。\n先說明你打算怎麼做，再動手。\n", "flow": "common", "stage": ""}, {"title": "上下文壓縮＋接續開發", "category": "開發過程", "usage": "對話太長變慢、或要開新對話接續時", "prompt": "請把目前對話的上下文壓縮成摘要，包含：已完成事項、未完成功能、關鍵決策。\n然後繼續完善未完成的功能。\n", "flow": "common", "stage": ""}, {"title": "上下文壓縮接續摘要", "category": "三方 AI 協作", "usage": "上下文壓縮後，固定用這個格式交接，讓下一輪能接續", "flow": "dualai", "stage": "context-compact", "tags": ["上下文", "壓縮", "接續"], "prompt": "【上下文已壓縮】\n目前任務：\n已完成：\n- \n待處理：\n- \n重要結論：\n"}, {"title": "首次備份到 GitHub（私有）", "category": "版本控制", "usage": "專案第一次備份", "prompt": "幫我把這個專案第一次備份到 GitHub，倉庫設為私有（不公開）。\n如果碰到權限攔截的提示，改為完整存取權限。\n", "flow": "common", "stage": ""}, {"title": "存檔當前改動（git 版本）", "category": "版本控制", "usage": "完成一個段落就存一次，像遊戲存檔", "prompt": "將當前改動保存為 git 版本，提交訊息為：【這次改了什麼】\n", "flow": "common", "stage": ""}, {"title": "列出版本＋退回指定版本", "category": "版本控制", "usage": "改壞了想回到之前的狀態", "prompt": "1. 先列出之前所有 git 存檔版本\n2. 等我選定後，幫我回到我指定的那個版本\n", "flow": "common", "stage": ""}, {"title": "接入外部 API", "category": "整合串接", "usage": "要串接第三方服務時", "prompt": "幫我為這個專案接入真實的【API 名稱】。\n請告訴我：具體怎麼操作與設定、我需要提供給你什麼資訊（帳號/金鑰），\n並給我詳細的網址和操作步驟。\n", "flow": "common", "stage": ""}, {"title": "本地資料庫搬上雲端", "category": "整合串接", "usage": "資料庫要從本機搬到雲端時", "prompt": "我想把本地資料庫初始化到雲端資料庫【平台/版本】。\n我是新手，請推薦適合小白的平台，給我完整步驟；\n你能先幫我做掉的部分請先做掉。\n", "flow": "common", "stage": ""}, {"title": "配置 MySQL／MS SQL Server 雲端資料庫", "category": "整合串接", "usage": "確定要用這兩種資料庫時", "prompt": "我要用 MySQL 或 MS SQL Server 這樣的雲端資料庫，該怎麼配置？\n給我詳細的步驟與設定，用小白聽得懂的方式說明。\n", "flow": "common", "stage": ""}, {"title": "依上架要求改造專案", "category": "上線部署", "usage": "準備上架／上線前的整理", "prompt": "按照先前規劃好的上架/上線技術要求，先把整個專案改好，\n方便我後續的上架或上線動作。完成後告訴我改了哪些地方。\n", "flow": "common", "stage": ""}, {"title": "部署讓別人也能訪問（含 Docker）", "category": "上線部署", "usage": "要把成果分享給其他人用時", "prompt": "我要讓這個專案在【本地設備/雲端伺服器】上，讓所有拿到網址的人都能訪問。\n我不懂部署，給我偏向小白的詳細步驟或設定；\n如果適合用 Docker，請一步一步教我怎麼操作。\n", "flow": "common", "stage": ""}, {"title": "啟動三方 AI 工作流（skill 版，一句話）", "category": "三方 AI 協作", "usage": "入口·已安裝 dual-ai-workflow skill 後，開新任務只要貼這句", "prompt": "使用 dual-ai-workflow 開始三方 AI 工作流，任務是：【任務描述】\n", "flow": "dualai", "stage": "entry"}, {"title": "啟動三方 AI 五階段工作流（手動版，一次貼上）", "category": "三方 AI 協作", "usage": "入口·沒安裝 skill 時，開任務前貼給主力 AI", "prompt": "我們採用三方 AI 五階段工作流：\n- Codex：主力工程師，負責規劃、分段實作、跑指令、測試、修正、產出交接摘要\n- Claude Code（VS Code）：審查員，負責架構審查、程式碼審查、風險檢查、P0/P1/P2 分級與複審\n- Claude Desktop：顧問／文字助理，負責需求澄清、文件整理、提示詞優化與主管版說明；不安裝第三方 skills\n- 我：三方之間轉貼，做最終決定\n\n第一階段：Codex 先讀專案結構與文件，不要修改，提出方案（目標／改哪些檔案／影響／風險／驗證方式），等我確認\n第二階段：Codex 依確認後的方案分段實作、跑 build.py、回報實際結果\n第三階段：我把 Codex 的交接摘要、diff 與驗證結果交給 Claude Code（VS Code）審查，請它給 P0/P1/P2 風險與修復建議\n第四階段：我把審查意見貼回 Codex，讓 Codex 逐條判斷並修正，重新驗證\n第五階段：我把修正後結果交給 Claude Code（VS Code）複審；通過後由 Codex 做 git 存檔\n\n現在從第一階段開始，任務是：【任務描述】\n", "flow": "dualai", "stage": "entry"}, {"title": "① 第一階段：Codex 規劃", "category": "三方 AI 協作", "usage": "在 Codex 開新任務，先出方案不動手", "prompt": "請先讀取專案結構與相關文件，不要直接修改。\n請提出實施方案，說明：\n1. 任務目標\n2. 需要修改哪些檔案\n3. 可能影響哪些功能\n4. 風險與不確定點\n5. 修改後如何驗證\n", "flow": "dualai", "stage": "1"}, {"title": "② 第二階段：Codex 分段實作", "category": "三方 AI 協作", "usage": "方案確認後，讓 Codex 分段修改、build、驗證", "prompt": "現在由 Codex 負責分段實作，其他 AI 暫停動作。\n請依照已確認的方案，在真實專案中分段修改。\n修改完成後請回報：\n1. 修改了哪些檔案\n2. 每個檔案改了什麼\n3. 是否成功執行 build.py\n4. 真實檔案狀態與未確認事項\n", "flow": "dualai", "stage": "2"}, {"title": "③ 第三階段：Claude Code（VS Code）審查", "category": "三方 AI 協作", "usage": "把 Codex 的交接摘要、diff 與驗證結果貼給 Claude Code 審查", "prompt": "現在由 Claude Code（VS Code）負責審查，其他 AI 暫停動作。\n請審查這次 Codex 的改動、diff 與驗證結果，重點檢查：\n1. 明顯 bug\n2. 邊界情況\n3. 是否影響原有功能\n4. 是否漏掉測試\n5. 是否有不必要的重構\n請用 P0/P1/P2 分級，並輸出給 Codex 的完整修正轉交提示詞。\n", "flow": "dualai", "stage": "3"}, {"title": "④ 第四階段：Codex 修正", "category": "三方 AI 協作", "usage": "把 Claude Code 的審查意見貼回給 Codex 逐條處理", "prompt": "現在由 Codex 負責修正，其他 AI 暫停動作。\n請逐條判斷 Claude Code（VS Code）的 review 意見：\n1. 問題是否真的存在\n2. 如果存在，要改什麼、為什麼這樣改\n3. 如果不成立，請說明理由\n4. 請只修必要檔案並重新驗證\n5. 請列出修完後要跑的驗證\n", "flow": "dualai", "stage": "4"}, {"title": "⑤ 第五階段：Claude Code（VS Code）複審", "category": "三方 AI 協作", "usage": "把修正後結果交給 Claude Code 複審，通過後交回 Codex 存檔", "prompt": "現在由 Claude Code（VS Code）負責複審，其他 AI 暫停動作。\n請再次檢查修正後的結果，確認前一輪問題是否已處理，並檢查是否引入新問題。\n如果通過，請輸出給 Codex 的存檔轉交提示詞，要求 Codex 做最終驗證與 git commit。\n", "flow": "dualai", "stage": "5"}, {"title": "接續三方 AI 工作流（貼另一個 AI 的輸出）", "category": "三方 AI 協作", "usage": "把一邊 AI 的產出搬到另一邊時，加這句開頭", "prompt": "這是另一個 AI 的輸出，請依 dual-ai-workflow 接續下一階段：\n【貼上對方 AI 的輸出】\n", "flow": "dualai", "stage": "handoff"}, {"title": "讀取 NEXT-AI-TASK.md 並接續", "category": "三方 AI 協作", "usage": "讓下一棒 AI 讀取固定交棒檔並接續任務", "flow": "dualai", "stage": "handoff", "tags": ["交棒", "接續", "NEXT-AI-TASK"], "prompt": "請讀取專案根目錄的 NEXT-AI-TASK.md 與 DUAL-AI-STATE.md。\n請不要依賴對話記憶，以檔案內容與目前 git 狀態為準接續任務。\n\n請先回報：\n1. 目前任務是什麼\n2. 下一棒 AI 是誰\n3. 你現在要做什麼\n4. 需要讀取哪些檔案\n5. 是否有不清楚或高風險事項\n\n如果你是 Claude Code（VS Code），請依 NEXT-AI-TASK.md 做 P0/P1/P2 審查。\n如果你是 Codex，請依 NEXT-AI-TASK.md 做修正、驗證或存檔。\n未經使用者明確要求，不要 push。\n"}, {"title": "單一 AI 也能用控制台", "category": "三方 AI 協作", "usage": "同事只用 Codex、Claude Code 或 Claude Desktop 時，讓它照控制台模板工作", "prompt": "我現在只使用一個 AI，但想用這套 Skill 助手控制台輔助工作。\n請你先扮演主力助理，依照以下流程處理：\n1. 先幫我釐清任務目標\n2. 先提出方案，不要立刻修改\n3. 等我確認後，再分段執行\n4. 每完成一段，回報改了什麼、怎麼檢查、下一步是什麼\n5. 如果是程式或系統修改，請提醒我是否需要找另一個 AI 做審查\n任務是：【任務描述】\n", "flow": "solo", "stage": "entry"}, {"title": "請 Claude Code（VS Code）審查（含系統背景模板）", "category": "三方 AI 協作", "usage": "進階·需要附完整系統背景做嚴謹審查時", "prompt": "現在由 Claude Code（VS Code）負責審查，其他 AI 暫停動作。\n請以架構師＋審查員身分審查以下 Codex 改動。\n【系統背景】\n- 系統名稱：【】\n- 使用者：【】\n- 技術棧：【】\n- 目前階段：【】\n- 這次改了什麼：【貼上交接摘要】\n請回覆：1. 結論 2. 問題分級（P0 不修不能上線／P1 應該修／P2 有空再修）\n3. 給 Codex 的修正提示詞 4. 驗證要求\n", "flow": "dualai", "stage": "3"}, {"title": "新增 Skill 到控制台（安檢＋安裝＋收錄）", "category": "Skill 管理", "usage": "看到新 skill 想安裝時，整段貼給 Claude 一次完成", "prompt": "我看到一個新 skill 想安裝，位置：【GitHub 網址或資料夾路徑】\n請依序幫我：\n1. 先做資安檢查（外部腳本、機密讀取、提示詞注入、來源可追溯性），給風險等級\n2. 風險可接受的話，幫我安裝到 ~/.codex/skills 和 ~/.claude/skills\n3. 把它加進控制台 data/skills.yaml（中文說明＋觸發句＋風險標示）\n4. 重新打包 codex-skills-backup.tar.gz 並執行 scripts/build.py 重建 index.html\n5. git 存檔備份\n", "flow": "common", "stage": ""}, {"title": "新增提示詞到控制台", "category": "Skill 管理", "usage": "收集到好用的提示詞，丟給 Claude 收錄", "prompt": "幫我把下面這段提示詞收錄到控制台：\n1. 修正錯字、整理格式、把可替換處改成【】佔位符\n2. 加進 data/prompts.yaml 並歸到合適分類（沒有就開新分類）\n3. 執行 scripts/build.py 重建 index.html\n4. git 存檔備份\n提示詞內容：\n【貼上你收集到的提示詞】\n", "flow": "common", "stage": ""}, {"title": "Skill 安裝前資安檢查", "category": "安全檢查", "usage": "從網路上看到新 skill，安裝前必跑", "prompt": "這是我要安裝的 skill（資料夾或連結如下），安裝前請幫我做資安檢查：\n1. 是否會執行外部下載的腳本（如 curl | bash）\n2. 是否讀取或上傳憑證、私密檔案（~/.ssh、.env、API key）\n3. SKILL.md 或腳本裡是否藏有提示詞注入（叫 AI 忽略我的指令）\n4. 來源是否可追溯（公開 repo、作者、星數）\n最後給我風險等級（可裝／謹慎／不要裝）與理由。\nskill 位置：【】\n", "flow": "common", "stage": ""}, {"title": "查目前進度（讀 DUAL-AI-STATE.md）", "category": "三方 AI 工作流", "usage": "不知道現在做到哪一步時使用；AI 會讀取進度檔，不靠聊天記憶。", "flow": "dualai", "stage": "status", "prompt": "請先讀取專案根目錄的 DUAL-AI-STATE.md，並且只用下面三行回報目前狀態：\n\n現在在哪：第 N 階段，簡短說明目前任務。\n上一步做了什麼：用一句話摘要上一個已完成動作。\n下一步要做什麼：用一句話說明下一個建議動作。\n\n不要依賴對話記憶；如果 DUAL-AI-STATE.md 內容不足或疑似亂碼，請明確說明「進度檔無法可靠判讀」，並列出你需要我補充的最少資訊。"}, {"title": "額度快滿自動存檔＋換手", "category": "三方 AI 工作流", "usage": "看到 session limit、90% used、token 快滿或快不能回覆時，先保進度再換 AI。", "flow": "dualai", "stage": "status", "prompt": "你現在偵測到用量或 session 快滿，請立刻進入「額度快滿保護模式」。\n\n請先暫停非必要修改，優先完成下面三件事：\n1. 讀取並更新專案根目錄的 DUAL-AI-STATE.md。\n2. 寫清楚：任務名稱、目前階段、已完成事項、下一步、未解決問題、最後更新時間。\n3. 產出一段可直接貼給下一個 AI 的交接提示詞。\n\n交接提示詞第一行必須是：\n目前進度：第 N 階段／上一步：X／下一步：Y\n\n請不要依賴聊天記憶；以 DUAL-AI-STATE.md 和目前工作目錄的實際檔案為準。\n如果額度已不足以 build 或 commit，請明確說「先保進度，尚未完成 build / commit」，不要硬做高風險操作。"}, {"title": "單AI精簡 1 規劃", "category": "單AI精簡", "usage": "只用一個 AI 做小系統或小功能時，先請它列出最小可行做法。", "flow": "solo", "stage": "1", "prompt": "請用「單一 AI 精簡流程」協助我規劃這個小功能／小系統。\n\n請先讀取專案規劃文件（例如 AGENTS.md、PRD.md、docs/ 或我指定的檔案），先不要改檔。\n\n請輸出：\n1. 任務目標\n2. 需要修改哪些檔案\n3. 最小可行做法\n4. 可能風險\n5. 修改後如何驗證\n\n請用小白能看懂的方式說明，不要一次做太大範圍。"}, {"title": "單AI精簡 2 實作", "category": "單AI精簡", "usage": "規劃確認後，請同一個 AI 直接做最小範圍修改。", "flow": "solo", "stage": "2", "prompt": "請依照前一步規劃開始實作。\n\n要求：\n1. 只修改這次任務需要的檔案\n2. 不要刪除任何檔案\n3. 若遇到風險或不確定，先停下來說明\n4. 修改完成後立即執行可用的檢查或測試\n5. 若是網頁 UI，請確認畫面真的能看、按鈕真的能用\n\n完成後請回報：改了哪些內容、如何檢查、是否還有未完成風險。"}, {"title": "單AI精簡 3 自我檢查", "category": "單AI精簡", "usage": "實作後請 AI 自己用審查角度檢查一次。", "flow": "solo", "stage": "3", "prompt": "請用審查者角度檢查剛剛的修改。\n\n請優先檢查：\n1. 有沒有明顯 bug\n2. 有沒有破壞既有功能\n3. 有沒有漏掉必要測試\n4. UI 文字是否容易理解\n5. 是否有不必要的大改或風險操作\n\n請用 P0／P1／P2 標示問題嚴重度；如果沒有問題，請明確說「未發現阻擋問題」，並列出仍建議人工確認的地方。"}, {"title": "單AI精簡 4 存檔", "category": "單AI精簡", "usage": "確認功能 OK 後，整理變更摘要，方便存檔或提交版本。", "flow": "solo", "stage": "4", "prompt": "請整理這次修改的存檔摘要。\n\n請輸出：\n1. 修改了哪些檔案\n2. 使用者看得到的變化\n3. 已執行的檢查或測試\n4. 尚未驗證的風險\n5. 建議的 git commit message\n\n如果工作目錄還有不是你造成的變更，請分開列出，不要混在本次修改摘要裡。"}, {"title": "從討論結果產出 AGENTS.md（設計方向確認後用）", "category": "專案啟動", "usage": "已和 AI 討論完設計方向，請 AI 整理成可直接放專案根目錄的 AGENTS.md", "flow": "common", "stage": "", "prompt": "我們剛剛已經討論完這個專案的設計方向，請依下面資訊產出一份可直接放在專案根目錄的 AGENTS.md。\n\n【已知資訊（請以對話脈絡為主，下面欄位空白就用對話內容自動補）】\n- 專案名稱：【】\n- 專案簡介（一兩句話）：【】\n- 目標使用者：【】\n- 技術棧（若已決定）：【】\n- 是否採用三方 AI 工作流（Codex / Claude Code（VS Code）/ Claude Desktop）：【是 / 否】\n\n【AGENTS.md 必含段落】\n1. 第一行：「# AGENTS.md — 專案頂層規則文件」\n2. 專案名稱與簡介\n3. 開發協作規範（AI 必須遵守），至少包含：\n   - 每個任務先看規劃文件再執行\n   - 一個對話只做一個明確任務\n   - 不要刪除文件，除非用戶明確要求\n   - 需求不清楚時，先提出關鍵問題，不要直接猜著做\n   - 任務有風險時，先明說風險再執行\n   - 修改完成後總結：改了什麼、如何檢查、下一步建議\n   - 用小白能聽懂的話解釋，遇到技術名詞順手用一句話解釋\n4. 專案檔案結構（先用樹狀圖列出目前已知的檔案；缺的之後補）\n5. 若採用三方 AI 工作流：補一段「AI 角色分工」表格（Codex 主力、Claude Code（VS Code）審查、Claude Desktop 顧問／文字助理），並指向 docs/dual-ai-workflow.md 與 docs/ai-role-guide.md\n6. 技術棧與環境需求（若已決定）\n\n【寫作要求】\n- 全程繁體中文\n- 小白能看懂的語氣，避免行話\n- AGENTS.md 是給人讀的規範文件，不要塞程式碼\n- 完成後請告訴我建議的下一步（例如：建立 PRD.md、初始化 git、設定 .gitignore、跑 scripts/build.py）"}, {"title": "給 Codex 的逐條修正轉交提示詞（模板）", "category": "三方 AI 協作", "usage": "第 3 階段審查完成後，固定把意見搬給 Codex 進入第 4 階段時用這張", "flow": "dualai", "stage": "3", "prompt": "依 dual-ai-workflow 第 4 階段（Codex 修正），請逐條處理 Claude Code（VS Code）複審意見並重新驗證。\n\n【背景】\n- 任務：【任務名稱】\n- 狀態檔：請先讀取 DUAL-AI-STATE.md，根據實際結果更新欄位（不要直接複用舊內容）。\n- 複審結論：P0=【數量】、P1=【數量】、P2=【數量】。\n\n【P0/P1 必修，逐條處理】\n1. 【問題標題】：\n   - 位置：【檔案:行號】或【描述】\n   - 現象／影響：【一句話】\n   - 建議改法：【具體動作】\n   - 驗證方式：【跑什麼指令／怎麼確認】\n\n【P2 建議處理（若延後請寫進 DUAL-AI-STATE.md 的「未解決問題」）】\n2. 【問題標題】：【建議改法】\n\n【驗證清單（修完每項都跑一次）】\n- 【build／測試指令，例如 python3 scripts/build.py】\n- 【人工確認步驟，例如雙擊網頁、搜尋特定關鍵字】\n- git status：除你刻意修改的檔，不應出現新的 untracked。\n\n【git 存檔規則】\n- 不要 `git add .`。請逐檔加：【列出本輪預計動到的檔】\n- commit message 建議：「【動詞】+【主題】」\n- 不要 push 到 origin/main，本地存檔即可，等使用者決定。\n\n【輸出格式】\n完成後請輸出：\n1. 逐條 P0/P1/P2 處理結果（成立／不成立＋原因）。\n2. 重新驗證結果（含關鍵 hash 或數據實測值）。\n3. 新 diff（精簡列出檔案與重點變更）。\n4. 給 Claude Code（VS Code）的完整轉交提示詞，進入第 5 階段複審。"}, {"title": "給 Codex 的存檔收尾提示詞（模板）", "category": "三方 AI 協作", "usage": "第 5 階段複審通過後，把閉環收尾交回 Codex 時用這張", "flow": "dualai", "stage": "5", "prompt": "dual-ai-workflow 第 5 階段（Claude Code 複審）已通過，無 P0/P1/P2 殘留問題。\n\n請執行下列存檔收尾工作（不再做功能修改）：\n\n【一、最終驗證（任何 push 前必跑）】\n1. 重新比對本輪關鍵驗證指標（hash／build 結果／檔案路徑），實測值需與 DUAL-AI-STATE.md 一致。\n2. git status 必須乾淨；確認 `git status --ignored` 中該忽略的項目仍被忽略。\n3. 人工開啟成品（例如雙擊 index.html）做最後一眼確認。\n\n【二、DUAL-AI-STATE.md 收尾】\n- 將「目前階段」改為「✅ 已完成（dual-ai-workflow 第 5 階段複審通過）」。\n- 「已完成事項」追加一行：「第 5 階段 Claude Code（VS Code）複審通過，無 P0/P1/P2 殘留，commit【hash】為最終存檔。」\n- 「下一步」改為：「等待使用者決定是否 push 到 origin/main；多裝置同步請以本機標準版覆蓋。」\n- 「未解決問題」保留尚未處理但已知的小事項。\n- 更新「最後更新時間」為現在時間。\n- 此次只改 DUAL-AI-STATE.md，獨立成一個 commit，message 建議：「閉環完成：第 5 階段複審通過」。\n\n【三、是否 push 由使用者決定】\n- 不要自動 push origin/main。請輸出兩段給使用者選：\n  (a)「只保留本地存檔」→ 不做任何網路動作。\n  (b)「同步到 GitHub」→ 提供 `git push origin main` 指令並提醒檢查 commit 不含敏感資料。\n\n【四、多裝置同步指引】\n請輸出一段可貼給另一台機器（例如 Mac mini）使用者執行的指令，把本機標準版檔案覆蓋過去，避免重新生成造成格式或行尾不一致（例如 LF/CRLF）。\n\n完成後請輸出：\n1. 上述驗證的實測結果。\n2. 新增的 DUAL-AI-STATE.md commit hash。\n3. 給使用者的 (a)/(b) 兩選一指引。\n4. 多裝置同步指令。"}, {"title": "首次上傳 GitHub：繁體中文專案敘述", "category": "版本控制", "usage": "第一次把專案上傳到 GitHub，或準備更新 repo 說明、README 摘要、commit / release 文字時使用。", "flow": "common", "stage": "", "prompt": "請協助我準備這個專案首次上傳 GitHub 的繁體中文說明與存檔流程。\n\n【基本原則】\n- GitHub repo 名稱、description、README 摘要、commit message、release note 預設全部使用繁體中文。\n- 除非網友或使用者明確要求多語言，第一版不要主動加入英文或其他語言版本。\n- push 前請先詢問我「這個版本做了哪些動作」，或依 git diff / git log 自動整理一版繁體中文摘要讓我確認。\n\n【請依序完成】\n1. 讀取專案目前檔案與 git status。\n2. 整理 repo description 建議（一句繁體中文）。\n3. 整理 README 開頭摘要建議（小白看得懂）。\n4. 整理本次 commit / release 摘要：新增、修改、驗證、未完成事項。\n5. push 前提醒檢查敏感資料與不該公開的大檔。\n\n【敏感資料檢查】\n請特別檢查是否包含：\n- API key、token、密碼、.env\n- SSH key、憑證、私密設定檔\n- 私人對話、個資、公司內部資訊\n- 不該公開的壓縮包、備份包或大型二進位檔\n\n【輸出】\n請輸出：\n1. 建議的 GitHub repo description（繁體中文）\n2. README 摘要段落（繁體中文）\n3. 本版本做了哪些動作（繁體中文條列）\n4. push 前敏感資料檢查結果\n5. 若安全，最後只提供 `git push origin main` 指令；不要替我自動 push。"}, {"title": "跨地點 / 跨系統接續", "category": "三方 AI 協作", "usage": "公司、家裡、Mac mini、Windows 電腦之間接續同一個專案時，用來安全存檔、pull、同步 skills 與交接狀態。", "flow": "dualai", "stage": "handoff", "prompt": "請協助我做「跨地點 / 跨系統接續」存檔與交接，本輪不要自動 push，除非我明確確認。\n\n【本機收尾流程】\n1. 執行 `git status`，確認哪些檔案是本輪變更。\n2. 更新 DUAL-AI-STATE.md：目前階段、已完成事項、下一步、未解決問題、最後更新時間。\n3. 用繁體中文整理 commit message 與本版本做了哪些動作。\n4. 逐檔 `git add`，不要使用 `git add .`。\n5. 建立本地 commit。\n6. 詢問我是否 push；push 前提醒檢查敏感資料與大檔案。\n\n【另一端接續後回報】\n另一台電腦完成 `git pull --ff-only` 後，請只用三行回報：\n1. 目前 commit：`git log --oneline -1`\n2. 工作目錄狀態：`git status --short`\n3. 下一步：依 DUAL-AI-STATE.md 建議接續哪個任務\n\n【macOS 指令】\n若要同步全部 skills，請改用 `./restore-skills.sh`（macOS）；下面只覆蓋自製 `dual-ai-workflow`。\n\n```bash\ngit pull --ff-only\ngit status --short\ngit log --oneline -1\nmkdir -p ~/.codex/skills ~/.claude/skills\ncp -R skills/dual-ai-workflow ~/.codex/skills/\ncp -R skills/dual-ai-workflow ~/.claude/skills/\n```\n\n【Windows PowerShell 指令】\n若要同步全部 skills，請改用 `install.ps1`（Windows）；下面只覆蓋自製 `dual-ai-workflow`。\n\n```powershell\ngit pull --ff-only\ngit status --short\ngit log --oneline -1\nNew-Item -ItemType Directory -Force \"$HOME\\.codex\\skills\", \"$HOME\\.claude\\skills\"\nCopy-Item -Recurse -Force \"skills\\dual-ai-workflow\" \"$HOME\\.codex\\skills\\\"\nCopy-Item -Recurse -Force \"skills\\dual-ai-workflow\" \"$HOME\\.claude\\skills\\\"\n```\n\n【skills 路徑提醒】\n- Windows：`$HOME\\.codex\\skills\\`、`$HOME\\.claude\\skills\\`\n- macOS：`~/.codex/skills/`、`~/.claude/skills/`\n- `skills/dual-ai-workflow/SKILL.md` 以 LF 行尾為標準；不要重新生成成 CRLF。"}], "combos": [{"title": "開新專案起手包", "usage": "開始一個新專案時，快速建立規則、PRD 與繁中 GitHub 說明。", "category": "專案啟動", "steps": [{"prompt_title": "從討論結果產出 AGENTS.md（設計方向確認後用）", "custom_intro": "第一步，先把討論過的設計方向整理成專案規則文件。"}, {"prompt_title": "梳理需求並產出 PRD", "custom_intro": "第二步，把需求整理成可開發、可驗收的 PRD。"}, {"prompt_title": "首次上傳 GitHub：繁體中文專案敘述", "custom_intro": "第三步，整理繁體中文 repo 說明、版本摘要與 push 前檢查。"}]}, {"title": "三方審查修正包", "usage": "Codex 做完實作後，交給 Claude Code 審查，再回到 Codex 修正與收尾。", "category": "三方 AI 協作", "steps": [{"prompt_title": "③ 第三階段：Claude Code（VS Code）審查", "custom_intro": "先把 Codex 的實作交給 Claude Code 做 P0/P1/P2 審查。"}, {"prompt_title": "給 Codex 的逐條修正轉交提示詞（模板）", "custom_intro": "審查完後，把問題逐條搬回 Codex 修正。"}, {"prompt_title": "給 Codex 的存檔收尾提示詞（模板）", "custom_intro": "複審通過後，請 Codex 做最後驗證、狀態檔與本地 commit。"}]}, {"title": "跨地點接續包", "usage": "公司、家裡、Mac mini、Windows 電腦之間接續同一個專案。", "category": "三方 AI 協作", "steps": [{"prompt_title": "跨地點 / 跨系統接續", "custom_intro": "下班、換電腦或不同系統接手前，先完成安全存檔與交接。"}, {"prompt_title": "查目前進度（讀 DUAL-AI-STATE.md）", "custom_intro": "另一台電腦接手後，先讀狀態檔確認目前到哪。"}, {"prompt_title": "額度快滿自動存檔＋換手", "custom_intro": "如果 AI 額度快滿，先保進度再換手，避免工作斷掉。"}]}]};
const WORKFLOW_HTML = "<div class=\"sop\"><div class=\"card\"><h2>三方 AI 工作流：Codex × Claude Code（VS Code）× Claude Desktop<\/h2>\n<div class=\"summary\">開發任何專案時，按照這套三方分工模式進行。簡單說：Codex 是主力工程師，負責規劃、分段實作、跑指令、測試、修正與交接；Claude Code（VS Code）是審查員，負責架構建議、程式碼審查、風險檢查與複審；Claude Desktop 是顧問／文字助理，負責需求討論、文件整理與提示詞優化。<\/div>\n<div class=\"summary\"><i>Claude Desktop 不當作第三方 skills 安裝環境。使用 Claude Desktop 時，請從控制台「提示詞庫」複製提示詞，或手動貼上工作流文件。<\/i><\/div>\n<\/div><div class=\"card\"><h2>角色定義<\/h2>\n<table><tbody>\n<tr><th>角色<\/th><th>定位<\/th><th>負責事項<\/th><th>不做的事<\/th><\/tr>\n<tr><td>Codex<\/td><td>主力工程師<\/td><td>讀規劃文件、拆任務、分段寫程式、執行指令、測試、驗證、修正、產出交接摘要<\/td><td>不跳過 Claude Code 審查<\/td><\/tr>\n<tr><td>Claude Code（VS Code）<\/td><td>審查員<\/td><td>架構建議、程式碼審查、風險檢查、P0/P1/P2 分級、複審<\/td><td>不取代 Codex 做整段主力開發，除非使用者明確指定小範圍修正<\/td><\/tr>\n<tr><td>Claude Desktop<\/td><td>顧問／文字助理<\/td><td>需求澄清、文件整理、提示詞優化、主管版說明<\/td><td>不安裝第三方 skills，不直接操作本機檔案<\/td><\/tr>\n<tr><td>使用者<\/td><td>最終決策者<\/td><td>三方之間轉貼訊息、做最終決定<\/td><td>不需要懂技術細節<\/td><\/tr>\n<\/tbody><\/table>\n<\/div><div class=\"card\"><h2>五階段流程<\/h2>\n<ul>\n<li>第 1 階段：Codex 讀專案結構與文件，不修改，提出方案。<\/li>\n<li>第 2 階段：Codex 依確認後的方案分段實作、跑 build、驗證、產出交接摘要與 diff。<\/li>\n<li>第 3 階段：Claude Code（VS Code）審查 Codex 的交接摘要、diff 與驗證結果，列出 P0/P1/P2 問題。<\/li>\n<li>第 4 階段：Codex 逐條判斷審查意見是否成立，只修必要檔案並重新驗證。<\/li>\n<li>第 5 階段：Claude Code（VS Code）複審；通過後交回 Codex 做 git 存檔。<\/li>\n<\/ul>\n<div class=\"summary\">Claude Desktop 可以在任一階段協助整理需求、轉寫主管版說明或優化提示詞，但不直接改檔。<\/div>\n<\/div><div class=\"card\"><h2>多裝置同步<\/h2>\n<ul>\n<li>這套工作流可能在 Windows、Mac mini、VS Code 裡的 Claude Code 使用。<\/li>\n<li>Codex 與 Claude Code 是可安裝 skills 的主要環境，要保持同一份 <code>dual-ai-workflow<\/code>。<\/li>\n<li>Claude Desktop 不當作第三方 skills 安裝環境；在 Claude Desktop 使用時，改用控制台「提示詞庫」或手動貼工作流文件。<\/li>\n<li>每次修改 <code>skills/dual-ai-workflow/SKILL.md<\/code> 後，要同步到所有會使用 Codex / Claude Code 且支援 skills 的裝置與執行環境。<\/li>\n<li>Windows 與 macOS 常見安裝位置相同：<code>~/.codex/skills/dual-ai-workflow/<\/code>、<code>~/.claude/skills/dual-ai-workflow/<\/code>。<\/li>\n<li>VS Code 裡的 Claude Code 要確認讀到同一份 <code>~/.claude/skills/dual-ai-workflow/SKILL.md<\/code>；如果設定了不同 skill 路徑，也要同步那一份。<\/li>\n<\/ul>\n<\/div><div class=\"card\"><h2>單一 AI 也能使用<\/h2>\n<div class=\"summary\">如果同事只用一個 AI，也可以用這個控制台：<\/div>\n<div class=\"summary\">1. 到「提示詞庫」複製「單一 AI 也能用控制台」。<\/div>\n<div class=\"summary\">2. 貼給手上的 AI。<\/div>\n<div class=\"summary\">3. 要求它先釐清任務，再提出方案，不要一開始就修改。<\/div>\n<div class=\"summary\">4. 如果是系統或程式修改，完成後再提醒是否需要找另一個 AI 做審查。<\/div><\/div><\/div>";

function copyText(text, btn){const done=()=>{btn.textContent="已複製";btn.classList.add("done");setTimeout(()=>{btn.textContent="複製";btn.classList.remove("done");},1400)};if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(fallback)}else fallback();function fallback(){const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);done()}}

function yamlBlock(value,indent="  "){const lines=(value||"").split(/\r?\n/);return lines.map(line=>indent+line).join("\n")}
function optionsHtml(list,active){return list.map(item=>`<option value="${esc(item)}" ${item===active?"selected":""}>${esc(item)}</option>`).join("")}
function promptCategories(){return PROMPT_CATEGORIES}
function skillCategories(){return [...new Set(DATA.skills.map(s=>s.category)),"其他"]}
function promptDraft(){const data=readDraft();return{title:data.title||"",category:data.category||"專案啟動",categoryOther:data.categoryOther||"",usage:data.usage||"",flow:data.flow||"common",stage:data.stage||"",prompt:data.prompt||""}}
function skillDraft(){const data=readDraft();return{name:data.name||"",source:data.source||"",category:data.category||"Skill 管理",categoryOther:data.categoryOther||"",risk:data.risk||"中",summary:data.summary||"",triggers:data.triggers||"",notes:data.notes||"",checked:!!data.checked}}
function captureData(){if(captureMode==="skill")return{name:formVal("skillName"),source:formVal("skillSource"),category:formVal("skillCategory")==="其他"?formVal("skillCategoryOther"):formVal("skillCategory"),categoryOther:formVal("skillCategoryOther"),risk:formVal("skillRisk")||"中",summary:formVal("skillSummary"),triggers:formVal("skillTriggers"),notes:formVal("skillNotes"),checked:formChecked("skillChecked")};return{title:formVal("promptTitle"),category:formVal("promptCategory")==="其他"?formVal("promptCategoryOther"):formVal("promptCategory"),categoryOther:formVal("promptCategoryOther"),usage:formVal("promptUsage"),flow:formVal("promptFlow")||"common",stage:formVal("promptStage"),prompt:formVal("promptText")}}
function promptYaml(d){return`- title: ${d.title||"【標題】"}\n  category: ${d.category||"專案啟動"}\n  usage: ${d.usage||"【用途】"}\n  flow: ${d.flow||"common"}\n  stage: '${yamlScalar(d.stage||"")}'\n  prompt: |-\n${yamlBlock(d.prompt||"【提示詞內容】","    ")}`}
function skillYaml(d){const triggers=(d.triggers||"【觸發句】").split(/\r?\n/).filter(Boolean).map(t=>`  - ${t}`).join("\n");return`- name: ${d.name||"【skill-name】"}\n  category: ${d.category||"Skill 管理"}\n  risk: ${d.risk||"中"}\n  summary: ${d.summary||"【用途摘要】"}\n  triggers:\n${triggers}\n  notes: ${d.notes||"來源："+(d.source||"【來源】")}`}
function codexCapturePrompt(d){const target=captureMode==="skill"?"data/skills.yaml":"data/prompts.yaml";const yaml=captureMode==="skill"?skillYaml(d):promptYaml(d);return`請把下面這筆新內容收錄進控制台。\n\n要求：\n1. 先檢查內容格式與風險。\n2. 寫入 ${target}。\n3. 執行 python3 scripts/build.py 重建 index.html。\n4. 驗證 index.html 搜尋得到新卡片。\n5. 建立本地 git commit，commit message 使用繁體中文。\n6. 不要 push origin/main，等使用者決定。\n\n${captureMode==="skill"?"我已確認先跑過「Skill 安裝前資安檢查」提示詞。\n\n":""}建議 YAML 片段如下：\n\n${yaml}`}
function captureHtml(){const d=captureMode==="skill"?skillDraft():promptDraft();const categoryList=captureMode==="skill"?skillCategories():promptCategories();const category=d.categoryOther?"其他":d.category;const otherStyle=category==="其他"?"":"display:none";const yaml=captureMode==="skill"?skillYaml(d):promptYaml(d);const codex=codexCapturePrompt(d);const disabled=captureMode==="skill"&&!d.checked;return`<div class="sop wide-sop"><div class="card"><div class="capture-switch"><button class="capture-btn ${captureMode==="prompt"?"active":""}" data-capture-mode="prompt">提示詞</button><button class="capture-btn ${captureMode==="skill"?"active":""}" data-capture-mode="skill">Skill</button></div><div class="summary">不知道怎麼填也沒關係，先貼原文。新手建議複製「給 Codex 的完整交辦提示詞」，讓 Codex 幫你寫入、重建、驗證與 commit。</div></div><div class="card"><h2>${captureMode==="skill"?"Skill 收錄表單":"提示詞收錄表單"}</h2>${captureMode==="skill"?skillForm(d,categoryList,category,otherStyle):promptForm(d,categoryList,category,otherStyle)}</div><div class="card"><h2>推薦複製：給 Codex 的完整交辦提示詞</h2>${disabled?`<div class="warning">請先勾選「我已對 skill 跑過 Skill 安裝前資安檢查」才可複製交辦提示詞。</div>`:""}<pre class="prompt-body" id="captureCodex">${esc(codex)}</pre><button class="copy-btn" ${disabled?"disabled":""} data-copy="${encodeURIComponent(codex)}">複製交辦提示詞</button></div><div class="card"><h2>進階檢查：YAML 片段</h2><div class="summary">這是給懂格式的人檢查用；不懂 YAML 也沒關係，複製上一段給 Codex 即可。</div>${disabled?`<div class="warning">尚未安檢，不建議收錄或安裝。</div>`:""}<pre class="prompt-body" id="captureYaml">${esc(yaml)}</pre><button class="copy-btn" data-copy="${encodeURIComponent(yaml)}">複製 YAML</button></div></div>`}
function promptForm(d,cats,category,otherStyle){return`<div class="form-grid"><div class="field"><label>標題</label><input id="promptTitle" data-capture-input value="${esc(d.title)}"><div class="help">這張卡片在控制台上顯示的名字。</div></div><div class="field"><label>分類</label><select id="promptCategory" data-capture-input>${optionsHtml(cats,category)}</select><input id="promptCategoryOther" data-capture-input style="${otherStyle}" value="${esc(d.categoryOther)}" placeholder="輸入其他分類"><div class="help">分類是之後搜尋和整理用的。</div></div><div class="field"><label>用途</label><input id="promptUsage" data-capture-input value="${esc(d.usage)}"><div class="help">什麼時候會用到它。</div></div><div class="field"><label>適用流程</label><select id="promptFlow" data-capture-input>${optionsHtml(["common","dualai","solo"],d.flow)}</select><div class="help">不確定就選 common。</div></div><div class="field"><label>階段</label><input id="promptStage" data-capture-input value="${esc(d.stage)}" placeholder="entry / 1 / 2 / 3 / 4 / 5 / archive"><div class="help">沒有階段就留空。</div></div><div class="field full"><label>提示詞原文</label><textarea id="promptText" data-capture-input>${esc(d.prompt)}</textarea><div class="help">貼上你想收錄的完整提示詞。</div></div></div>`}
function skillForm(d,cats,category,otherStyle){return`<div class="form-grid"><div class="field full"><label class="checkline"><input type="checkbox" id="skillChecked" data-capture-input ${d.checked?"checked":""}>我已對 skill 跑過「Skill 安裝前資安檢查」提示詞。</label><div class="help">陌生來源一定先安檢；未勾選時不會啟用 Codex 交辦提示詞。</div></div><div class="field"><label>Skill 名稱</label><input id="skillName" data-capture-input value="${esc(d.name)}"></div><div class="field"><label>來源</label><input id="skillSource" data-capture-input value="${esc(d.source)}" placeholder="GitHub URL 或資料夾路徑"></div><div class="field"><label>分類</label><select id="skillCategory" data-capture-input>${optionsHtml(cats,category)}</select><input id="skillCategoryOther" data-capture-input style="${otherStyle}" value="${esc(d.categoryOther)}" placeholder="輸入其他分類"></div><div class="field"><label>風險等級</label><select id="skillRisk" data-capture-input>${optionsHtml(["低","中","高"],d.risk)}</select><div class="help">預設中；確認安全後再改低。</div></div><div class="field full"><label>用途摘要</label><textarea id="skillSummary" data-capture-input>${esc(d.summary)}</textarea></div><div class="field full"><label>觸發句</label><textarea id="skillTriggers" data-capture-input placeholder="每行一句觸發句">${esc(d.triggers)}</textarea></div><div class="field full"><label>注意事項</label><textarea id="skillNotes" data-capture-input>${esc(d.notes)}</textarea></div></div>`}
function updateCaptureOutputs(){const data=captureData();const yaml=captureMode==="skill"?skillYaml(data):promptYaml(data);const codex=codexCapturePrompt(data);const yamlPre=document.getElementById("captureYaml"),codexPre=document.getElementById("captureCodex");if(yamlPre)yamlPre.textContent=yaml;if(codexPre)codexPre.textContent=codex;const buttons=document.querySelectorAll(".card .copy-btn");if(buttons.length>1){buttons[buttons.length-2].dataset.copy=encodeURIComponent(codex);buttons[buttons.length-1].dataset.copy=encodeURIComponent(yaml)}}
function bindCapture(){document.querySelectorAll("[data-capture-mode]").forEach(btn=>btn.onclick=()=>{captureMode=btn.dataset.captureMode;render()});document.querySelectorAll("[data-capture-input]").forEach(el=>el.oninput=el.onchange=()=>{const data=captureData();writeDraft(data);if(["skillChecked","skillCategory","promptCategory"].includes(el.id))render();else updateCaptureOutputs()})}
const SOP_HTML=`<div class="sop wide-sop"><div class="card"><h2>Skill 安裝前安檢</h2><ol><li>確認來源 repo 是否可信。</li><li>檢查是否讀取 API key、SSH key 或執行危險 shell 指令。</li><li>檢查是否要求 AI 忽略原本規則或外傳資料。</li></ol></div><div class="card"><h2>安檢提示詞</h2><pre class="prompt-body" id="sopPrompt"></pre><button class="copy-btn" id="sopCopy">複製</button></div></div>`;
function render(){const chips=document.getElementById("chips"),content=document.getElementById("content"),countLine=document.getElementById("countLine");renderIntro();chips.innerHTML=cats().map(c=>`<button class="chip ${c===cat?"active":""}" data-cat="${esc(c)}">${esc(c)}</button>`).join("");chips.querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{cat=ch.dataset.cat;if(tab==="prompts"&&cat!=="全部")flowMode="common";render()});if(tab==="backup"){countLine.textContent="";content.innerHTML=backupHtml();return}if(tab==="workflow"){countLine.textContent="";content.innerHTML=wideHtml(WORKFLOW_HTML);return}if(tab==="guide"){countLine.textContent="";content.innerHTML=wideHtml(GUIDE_HTML);return}if(tab==="progress"){countLine.textContent="";content.innerHTML=progressHtml();bindProgress();return}if(tab==="capture"){countLine.textContent="";content.innerHTML=captureHtml();bindCapture();return}if(tab==="control"){countLine.textContent="";content.innerHTML=controlHtml();bindControl();bindStateBoard();return}if(tab==="sop"){countLine.textContent="";content.innerHTML=SOP_HTML;const sp=DATA.prompts.find(p=>p.category==="安全檢查"||p.title.includes("安裝前資安檢查"));if(sp){document.getElementById("sopPrompt").textContent=sp.prompt;document.getElementById("sopCopy").dataset.copy=encodeURIComponent(sp.prompt)}return}if(tab==="skills"){const items=DATA.skills.filter(s=>(cat==="全部"||s.category===cat)&&match(s,["name","summary","category","triggers","notes"]));countLine.textContent=`共 ${items.length} 個 skill`;content.innerHTML=items.length?`<div class="grid">${items.map(skillCard).join("")}</div>`:`<div class="empty">找不到符合條件的 skill。</div>`;return}if(tab==="prompts"){const count=DATA.prompts.filter(p=>(p.flow||"common")===flowMode&&(cat==="全部"||p.category===cat)&&match(p,["title","usage","category","prompt","flow","stage"])).length;countLine.textContent=`目前顯示 ${count} 則提示詞，總共 ${DATA.prompts.length} 則`;content.innerHTML=renderPromptFlow();content.querySelectorAll(".flow-btn").forEach(btn=>btn.onclick=()=>{flowMode=btn.dataset.flow;cat="全部";render()})}}
function setTab(next){document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));document.querySelector(`[data-tab="${next}"]`)?.classList.add("active");tab=next;cat="全部";render()}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>setTab(t.dataset.tab));document.getElementById("searchBox").addEventListener("input",e=>{q=e.target.value.trim();render()});render();
</script>
</body>
</html>
